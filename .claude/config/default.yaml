# AI Coding Configuration
# 默认配置文件

version: "1.0"

project:
  name: "Full-Stack Project"
  type: "multi-platform"
  
platforms:
  backend:
    - java
    - spring-boot-4
    - cola-ddd
    
  frontend:
    - react
    - ios
    - harmonyos

directories:
  backend: "backend" | "java" | "src/main/java"
  frontend: "frontend" | "web" | "src"
  mobile: "mobile"

rules:
  enabled:
    - backend-java-springboot-cola
    - frontend-reactor-ios-harmony
  
  strict_mode: true
  
  auto_apply: true

skills:
  default:
    - java-cola-developer
    - frontend-developer
  
  context_aware: true

hooks:
  pre_commit:
    enabled: true
    auto_install: true
    
  post_merge:
    enabled: true
    
  ci_cd:
    provider: "github-actions"
    auto_trigger: true

java:
  jdk_version: "21"
  source_target: "21"
  home: "/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home"
  
  features:
    - virtual_threads
    - pattern_matching_switch
    - sequenced_collections
    - record
    - record_patterns
    - scoped_values
    
  libraries:
    mapstruct: true
    beanutils: false

linting:
  config_dir: ".claude/config/lint"
  
  java:
    tool: "checkstyle"
    config: ".claude/config/lint/alibaba-checkstyle.xml"
    standard: "alibaba-p3c"
    strict: true
    
  typescript:
    tool: "eslint"
    config: ".claude/config/lint/.eslintrc.json"
    strict: true
    
  swift:
    tool: "swiftlint"
    config: ".claude/config/lint/.swiftlint.yml"
    
  prettier:
    config: ".claude/config/lint/.prettierrc"

testing:
  coverage_threshold: 80
  auto_test: true
  
  backend:
    framework: "junit5"
    coverage: "jacoco"
    
  frontend:
    framework: "vitest" | "jest"
    coverage: "vitest"

security:
  secrets_detection: true
  dependency_audit: true
  code_analysis: true
