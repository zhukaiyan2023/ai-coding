# Skills 按需加载配置
# 根据任务类型自动加载需要的skills，控制context大小

# Skills定义
skills:
  # ========== 开发者 Skills ==========
  java-cola-developer:
    name: "Java COLA Developer"
    description: "Java 21 + Spring Boot 4 + COLA DDD"
    trigger:
      - ".java"
      - "pom.xml"
      - "build.gradle"
      - "spring"
      - "后端"
      - "Java"
    load_priority: 1
    max_context: 2000  # 最大context tokens

  react-developer:
    name: "React Developer"
    description: "React + TypeScript + Vite"
    trigger:
      - ".ts"
      - ".tsx"
      - "package.json"
      - "react"
      - "前端"
    load_priority: 1
    max_context: 1500

  ios-developer:
    name: "iOS Developer"
    description: "Swift + UIKit/SwiftUI"
    trigger:
      - ".swift"
      - "ios"
      - "xcode"
    load_priority: 1
    max_context: 1500

  harmony-developer:
    name: "HarmonyOS Developer"
    description: "ArkTS + ArkUI"
    trigger:
      - ".ets"
      - "harmony"
      - "鸿蒙"
    load_priority: 1
    max_context: 1500

  # ========== 文档 Skills ==========
  product-doc-writer:
    name: "Product Documentation Writer"
    description: "PRD、产品规格、用户故事"
    trigger:
      - "PRD"
      - "产品文档"
      - "产品需求"
      - "用户故事"
      - "产品规格"
    load_priority: 5
    max_context: 800

  requirement-doc-writer:
    name: "Requirement Documentation Writer"
    description: "技术需求文档、功能规范、验收标准"
    trigger:
      - "需求文档"
      - "功能规范"
      - "需求分析"
      - "REQ"
    load_priority: 5
    max_context: 800

  technical-doc-writer:
    name: "Technical Documentation Writer"
    description: "技术方案、架构文档、API文档、ADR"
    trigger:
      - "技术方案"
      - "架构文档"
      - "API文档"
      - "ADR"
      - "数据字典"
    load_priority: 5
    max_context: 1000

  changelog-writer:
    name: "Changelog Writer"
    description: "变更日志、版本发布说明、Git Commit"
    trigger:
      - "CHANGELOG"
      - "Release"
      - "发布说明"
      - "版本"
      - "commit"
    load_priority: 5
    max_context: 500

  # ========== 工具 Skills ==========
  skills-monitor:
    name: "Skills Monitor"
    description: "监控skills使用情况"
    trigger:
      - "监控"
      - "分析"
      - "report"
    load_priority: 10  # 低优先级，按需加载
    max_context: 500

  docs-quality-monitor:
    name: "Docs-Quality Monitor"
    description: "代码质量评分 + lint + 复杂度 + 文档同步"
    trigger:
      - "质量"
      - "lint"
      - "评分"
      - "重构"
      - "complexity"
      - "测试"
    load_priority: 5
    max_context: 800

# 加载策略
loading:
  # 自动加载 (根据文件类型)
  auto_load:
    - java-cola-developer
    - react-developer

  # 手动触发关键词
  keywords:
    "iOS": ios-developer
    "Swift": ios-developer
    "鸿蒙": harmony-developer
    "HarmonyOS": harmony-developer
    "分析": skills-monitor
    "报告": skills-monitor
    "PRD": product-doc-writer
    "产品文档": product-doc-writer
    "技术方案": technical-doc-writer
    "CHANGELOG": changelog-writer
    "Release": changelog-writer

# Context 控制
context:
  max_total: 8000
  per_skill_warning: 2000  # 超过此值警告精简
  auto_summary: true      # 自动摘要
