# Post-Merge Hooks 配置
name: AI Coding Post-Merge Hooks
description: 执行依赖安装和构建后清理

on:
  - post-merge

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Java Dependencies
        if: contains(github.extensions, 'pom.xml') || contains(github.extensions, 'build.gradle')
        run: |
          if command -v mvn &> /dev/null; then
            mvn dependency:resolve
          fi

      - name: Node Dependencies
        if: contains(github.extensions, 'package.json')
        run: |
          npm ci

      - name: iOS Dependencies
        if: contains(github.extensions, 'Podfile')
        run: |
          if command -v pod &> /dev/null; then
            pod install
          fi

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Backend Build
        if: contains(github.extensions, '.java')
        run: |
          mvn clean compile -DskipTests

      - name: Frontend Build
        if: contains(github.extensions, 'package.json')
        run: |
          npm run build

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Remove untracked files
        run: |
          git clean -fd

      - name: Update git hooks
        run: |
          echo "Git hooks updated"
