# Skill/Agent 加载日志 Hook
# 每次加载skill或agent时记录日志

name: Skill/Agent Usage Logger
description: 记录skills和agents的使用情况

on:
  - skill_loaded
  - agent_loaded

jobs:
  log-usage:
    name: Log Skill/Agent Usage
    runs-on: ubuntu-latest
    steps:
      - name: Log Skill/Agent Loaded
        run: |
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          SKILL_NAME="$CLAUDE_SKILL"
          AGENT_NAME="$CLAUDE_AGENT"
          TRIGGER="$CLAUDE_TRIGGER"
          
          # 写入日志
          LOG_FILE=".claude/logs/usage.log"
          mkdir -p .claude/logs
          
          if [ -n "$SKILL_NAME" ]; then
            echo "[SKILL_LOADED] $SKILL_NAME | $TIMESTAMP | $TRIGGER" >> $LOG_FILE
          fi
          
          if [ -n "$AGENT_NAME" ]; then
            echo "[AGENT_LOADED] $AGENT_NAME | $TIMESTAMP | $TRIGGER" >> $LOG_FILE
          fi
          
          echo "Logged: $SKILL_NAME $AGENT_NAME"

      - name: Update Skills Stats
        run: |
          STATS_FILE=".claude/logs/skills-stats.json"
          
          # 更新统计数据
          SKILL_NAME="$CLAUDE_SKILL"
          
          if [ -n "$SKILL_NAME" ]; then
            if [ -f "$STATS_FILE" ]; then
              # 使用jq更新统计
              jq --arg skill "$SKILL_NAME" '.skills[$skill] += 1' $STATS_FILE > tmp.json && mv tmp.json $STATS_FILE
            else
              echo "{\"skills\": {\"$SKILL_NAME\": 1}, \"total\": 1}" > $STATS_FILE
            fi
          fi
