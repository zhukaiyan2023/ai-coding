# Post-Task Hooks 配置
# 任务结束后分析skills使用情况

name: AI Coding Post-Task Analysis
description: 任务结束后分析skills使用情况和代码质量

on:
  - post_task

jobs:
  skills-usage-analysis:
    name: Skills Usage Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Analyze Skills Usage
        run: |
          echo "=== Skills使用分析 ==="
          
          # 检查当前使用的skills
          echo "当前激活的skills: $CLAUDE_SKILLS"
          
          # 记录使用的规则
          echo "[RULE_APPLIED] 三智能体架构 | $(date) | Planner/Generator/Evaluator流程"
          
      - name: Generate Usage Report
        run: |
          REPORT_FILE=".claude/reports/skills-analysis-$(date +%Y%m%d-%H%M%S).md"
          
          cat > $REPORT_FILE << 'EOF'
          # Skills使用分析报告
          
          ## 执行摘要
          - 任务类型: {task_type}
          - 使用的Skills: {skills_used}
          - 执行的规则: {rules_applied}
          
          ## 规则使用详情
          
          ### 已使用的规则
          | 规则 | 使用次数 | 文件 |
          |------|---------|------|
          
          ### 未使用的规则
          | 规则 | 未使用原因 |
          |------|-----------|
          
          ## 代码质量检查
          
          ### 通过的检查
          ### 未通过的检查
          
          ## 改进建议
          EOF
          
          echo "报告已生成: $REPORT_FILE"

  code-quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Check Modified Files
        run: |
          echo "检查改动的文件..."
          
          # 检查Java文件是否遵循COLA架构
          for file in $(git diff --name-only | grep '\.java$'); do
            echo "检查 $file 是否遵循COLA规范"
          done
          
          # 检查TypeScript文件是否使用严格模式
          for file in $(git diff --name-only | grep -E '\.ts$|\.tsx$'); do
            if grep -q ': any\b' "$file"; then
              echo "⚠️  $file 使用了 any 类型"
            fi
          done
          
      - name: Doom Loop Detection
        run: |
          echo "=== Doom Loop检测 ==="
          
          # 检查同一文件修改次数
          for file in $(git diff --name-only); do
            edit_count=$(git log --oneline --since="1 week" -- "$file" | wc -l)
            if [ "$edit_count" -gt 3 ]; then
              echo "⚠️  $file 修改次数: $edit_count (建议重新评估)"
            fi
          done

  recommendations:
    name: Generate Recommendations
    runs-on: ubuntu-latest
    steps:
      - name: Generate Next Steps
        run: |
          echo "=== 改进建议 ==="
          echo "1. 建议启用Sprint Contract协商流程"
          echo "2. 建议使用MapStruct替代BeanUtils"
          echo "3. 建议为复杂组件添加错误边界"
