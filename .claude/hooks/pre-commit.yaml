# Pre-Commit Hooks 配置
# 文件位置: .ai-coding/hooks/pre-commit.yaml

name: AI Coding Pre-Commit Hooks
description: Git pre-commit hooks for Java/Spring Boot + React/iOS/HarmonyOS projects

on:
  - pre-commit

jobs:
  # ============ 后端检查 ============
  backend-lint:
    name: Backend Lint (Java/Spring Boot)
    runs-on: ubuntu-latest
    if: |
      contains(github.extensions, '.java') ||
      contains(github.extensions, '.kt') ||
      contains(github.extensions, 'pom.xml') ||
      contains(github.extensions, 'build.gradle')
    steps:
      - name: Check Java files
        run: |
          echo "Running Java/Spring Boot checks..."
          
      - name: Check COLA Structure
        run: |
          # 验证 COLA 架构目录结构
          for dir in */src/main/java/*/; do
            if [[ ! -d "$dir/api" ]] && [[ ! -d "$dir/app" ]] && [[ ! -d "$dir/domain" ]] && [[ ! -d "$dir/infrastructure" ]]; then
              echo "Warning: $dir does not follow COLA structure"
            fi
          done

      - name: Maven Lint
        run: |
          if command -v mvn &> /dev/null; then
            mvn compile -q
          fi

  # ============ 前端检查 ============
  frontend-lint:
    name: Frontend Lint (React/Reactor)
    runs-on: ubuntu-latest
    if: |
      contains(github.extensions, '.ts') ||
      contains(github.extensions, '.tsx') ||
      contains(github.extensions, '.js') ||
      contains(github.extensions, 'package.json')
    steps:
      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          if [ -f "eslint.config.js" ] || [ -f ".eslintrc.js" ]; then
            npx eslint src --ext .ts,.tsx
          fi

      - name: Run TypeScript Check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          fi

  # ============ iOS 检查 ============
  ios-lint:
    name: iOS Lint (Swift)
    runs-on: macos-latest
    if: contains(github.extensions, '.swift')
    steps:
      - name: Swift Lint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint
          fi

  # ============ 鸿蒙检查 ============
  harmony-lint:
    name: HarmonyOS Lint
    runs-on: ubuntu-latest
    if: contains(github.extensions, '.ts') || contains(github.extensions, '.ets')
    steps:
      - name: HarmonyOS Build Check
        run: |
          echo "Running HarmonyOS checks..."

  # ============ 安全检查 ============
  security-check:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets
        run: |
          # 禁止提交敏感信息
          if git diff --cached | grep -iE "(password|secret|token|api_key|apikey)" > /dev/null; then
            echo "Error: Possible secrets detected in commit"
            exit 1
          fi

      - name: Dependency Check
        run: |
          # 检查依赖安全漏洞
          if [ -f "package.json" ]; then
            npm audit --audit-level=high || true
          fi

  # ============ 代码格式 ============
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Java Format
        if: contains(github.extensions, '.java')
        run: |
          if [ -f ".editorconfig" ]; then
            # Check Java files formatting
            echo "Checking Java formatting..."
          fi

      - name: TypeScript Format
        if: contains(github.extensions, '.ts')
        run: |
          if [ -f "prettier.config.js" ]; then
            npx prettier --check src/
          fi

# ============ 规则配置 ============
rules:
  max-file-size: 100KB
  allowed-branches:
    - main
    - develop
    - feature/*
    - bugfix/*
    - hotfix/*
  
  blocked-files:
    - "*.env"
    - "*.pem"
    - "*.key"
    - "credentials.json"
  
  required-checks:
    - security-check
    - format-check

# 跳过检查的标记
skip-markers:
  - "[skip lint]"
  - "[skip ci]"
  - "[skip checks]"
