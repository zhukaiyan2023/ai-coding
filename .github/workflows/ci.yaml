name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend-build:
    name: Backend Build (Java/Spring Boot/COLA)
    runs-on: ubuntu-latest
    if: |
      contains(github.extensions, '.java') ||
      contains(github.extensions, 'pom.xml') ||
      contains(github.extensions, 'build.gradle')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Backend
        run: mvn clean compile -DskipTests

      - name: Run Tests
        run: mvn test

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@v3

  frontend-build:
    name: Frontend Build (Reactor)
    runs-on: ubuntu-latest
    if: contains(github.extensions, 'package.json')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  ios-build:
    name: iOS Build (Swift)
    runs-on: macos-latest
    if: contains(github.extensions, '.swift')
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}

      - name: Install Dependencies
        run: pod install

      - name: Build
        run: xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug build

  harmony-build:
    name: HarmonyOS Build
    runs-on: ubuntu-latest
    if: contains(github.extensions, '.ts') || contains(github.extensions, '.json')
    steps:
      - uses: actions/checkout@v4

      - name: Setup HarmonyOS SDK
        uses: harmonyos/setup-dev-env@v1

      - name: Build
        run: |
          hvigorw build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Check
        run: |
          if [ -f "pom.xml" ]; then
            mvn org.owasp:dependency-check-maven:check
          fi
          if [ -f "package.json" ]; then
            npm audit --audit-level=high
          fi

      - name: Secret Detection
        run: |
          if command -v truffleHog &> /dev/null; then
            trufflehog filesystem . --json > secrets.json || true
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Backend
        run: |
          echo "Deploying backend..."

      - name: Deploy Frontend
        run: |
          echo "Deploying frontend..."
